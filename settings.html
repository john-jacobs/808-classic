<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <title>Settings | 808 Classic</title>
    <meta name="description" content="Update your 808 Classic profile and trip details." />
    <meta name="theme-color" content="#ff5f05" />
    <link rel="canonical" href="https://808classic.com/settings.html" />
    <link rel="icon" href="./assets/favicon.ico" sizes="any" />
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260703-craig-copy1" />
  </head>
  <body class="settings-body" data-settings-editing="false" data-settings-working="true">
    <header class="topbar" aria-label="808 Classic primary navigation">
      <a class="brand" href="./index.html#overview" aria-label="808 Classic home">
        <span class="brand-mark">808</span>
        <span>
          <strong>808 Classic</strong>
          <small>Official Tournament Operations</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Sections">
        <a href="./index.html#wire">Wire</a>
        <a href="./index.html#leaderboard-section">Leaderboard</a>
        <a href="./index.html#events">Schedule</a>
        <a href="./index.html#courses">Courses</a>
        <a href="./index.html#attendees">Field</a>
        <a href="./index.html#lodging">Logistics</a>
      </nav>
      <a class="account-link active" href="./settings.html" aria-label="Edit profile">
        <img src="./assets/favicon.svg" alt="" />
        <span>Profile</span>
      </a>
      <a class="admin-link" href="./admin.html">Admin</a>
    </header>

    <main>
      <section class="section settings-section">
        <div class="section-head split settings-head">
          <div>
            <h2>Edit Profile</h2>
            <a class="section-link" href="./index.html#attendees">Back to Field</a>
          </div>
          <div class="settings-actions">
            <button id="editSettingsBtn" class="secondary" type="button" disabled>Edit Profile</button>
            <button id="saveSettingsBtn" type="submit" form="settingsForm" disabled>Save Profile</button>
            <p id="settingsStatus" role="status"></p>
          </div>
        </div>

        <form id="settingsForm" class="settings-form" data-editing="false" data-working="true">
          <div class="settings-panel">
            <p class="wire-label">Profile</p>
            <div class="settings-photo-upload">
              <img id="profilePhotoThumb" src="./assets/favicon.svg" alt="" />
              <label>
                Profile picture
                <input id="profilePhotoInput" name="profile_photo" type="file" accept="image/jpeg,image/png,image/webp" />
                <span>JPG, PNG, or WebP. This updates your field headshot and Wire avatar.</span>
              </label>
            </div>
            <div class="settings-grid">
              <label>
                Name
                <input name="display_name" type="text" autocomplete="name" />
              </label>
              <label>
                Title
                <input name="title" type="text" placeholder="The Reluctant Favorite" />
              </label>
              <label>
                City
                <input name="city" type="text" placeholder="Seattle, WA" />
              </label>
              <label>
                Height
                <input name="height" type="text" placeholder="6' 1&quot;" />
              </label>
            </div>
            <label>
              Bio
              <textarea name="bio" rows="7" placeholder="Your official dossier copy. Modesty is not required. Accuracy is loosely encouraged."></textarea>
            </label>
            <label>
              Quote
              <input name="quote" type="text" placeholder="A regrettable sentence you might actually say" />
            </label>
            <div class="settings-grid">
              <label>
                Strength
                <input name="strength" type="text" />
              </label>
              <label>
                Weakness
                <input name="weakness" type="text" />
              </label>
            </div>
          </div>

          <div class="settings-panel">
            <p class="wire-label">Trip</p>
            <div class="settings-grid">
              <label>
                Attendance
                <select name="attendance_status">
                  <option value="confirmed">Confirmed</option>
                  <option value="tentative">Tentative</option>
                  <option value="not_attending">Not attending</option>
                </select>
              </label>
              <label>
                Handicap
                <input name="handicap" type="number" step="0.1" inputmode="decimal" />
              </label>
              <label>
                Arrival
                <input name="arrival" type="text" placeholder="Thu 7/16, 2:30 PM" />
              </label>
              <label>
                Departure
                <input name="departure" type="text" placeholder="Sun 7/19, 10:00 AM" />
              </label>
            </div>
            <label>
              Classic record
              <input name="classic_record" type="text" placeholder="1 appearance" />
            </label>
            <label>
              Trip detail
              <textarea name="detail" rows="4" placeholder="Trip-specific notes for this year's field card."></textarea>
            </label>
          </div>
        </form>
      </section>
    </main>

    <script src="./settings.js?v=20260703-craig-copy1"></script>
  </body>
</html>
